name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the Maple edition (HTML)
        run: sphinx-build -b html maple build/maple/html

      # GitHub Pages serves the artifact as-is (no Jekyll), but a .nojekyll
      # keeps underscore-prefixed dirs (_static, _images) safe on any path.
      - name: Disable Jekyll processing
        run: touch build/maple/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/maple/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
