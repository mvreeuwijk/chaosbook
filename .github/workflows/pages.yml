name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Cancel superseded runs so rapid pushes don't pile up
# in the Pages deploy queue (the cause of "Deployment failed, try again later").
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the Maple edition (HTML)
        run: sphinx-build -b html maple build/maple/html

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-pictures \
            texlive-science \
            tex-gyre

      - name: Build the Maple edition (PDFs)
        run: |
          sphinx-build -b latex maple build/maple/latex
          # The book, and the cookbook as a separate document.
          latexmk -pdf -interaction=nonstopmode -halt-on-error -cd build/maple/latex/main.tex
          latexmk -pdf -interaction=nonstopmode -halt-on-error -cd build/maple/latex/cookbook.tex
          # Publish both at the site root so they are downloadable.
          cp build/maple/latex/main.pdf build/maple/html/chaosbook.pdf
          cp build/maple/latex/cookbook.pdf build/maple/html/cookbook.pdf

      # GitHub Pages serves the artifact as-is (no Jekyll), but a .nojekyll
      # keeps underscore-prefixed dirs (_static, _images) safe on any path.
      - name: Disable Jekyll processing
        run: touch build/maple/html/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/maple/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      # GitHub Pages' deploy step intermittently returns "Deployment failed, try
      # again later" even when the artifact is fine. Retry it a couple of times
      # (the first two attempts don't fail the job; the last one does).
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before final attempt
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
